# cargo-about configuration for generating THIRD_PARTY_LICENSES.md.
# Run: cargo about generate about.hbs > THIRD_PARTY_LICENSES.md
accepted = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
    "bzip2-1.0.6",
]

# Build-dependency and dev-dependency crates are not part of the shipped
# artifacts, so they are excluded from the distributed license inventory.
ignore-build-dependencies = true
ignore-dev-dependencies = true

# Built-in fix-ups for crates with non-standard license metadata.
workarounds = ["ring"]

[private]
ignore = true
