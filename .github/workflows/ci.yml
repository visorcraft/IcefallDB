name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  DUCKDB_VERSION: v1.1.3

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install DuckDB CLI
        run: |
          curl -LO "https://github.com/duckdb/duckdb/releases/download/${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip"
          unzip duckdb_cli-linux-amd64.zip -d /tmp/duckdb
          echo "/tmp/duckdb" >> "$GITHUB_PATH"

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace --all-features

      - name: Run benchmarks
        run: cargo bench -p icefalldb-core --bench benchmarks -- --sample-size 10

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install DuckDB CLI
        run: |
          curl -LO "https://github.com/duckdb/duckdb/releases/download/${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip"
          unzip duckdb_cli-linux-amd64.zip -d /tmp/duckdb
          echo "/tmp/duckdb" >> "$GITHUB_PATH"

      - name: Build icefalldb CLI
        run: cargo build -p icefalldb-cli

      - name: Add CLI to PATH
        run: echo "$PWD/target/debug" >> "$GITHUB_PATH"

      - name: Install Python dependencies
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" ruff

      - name: Ruff check
        working-directory: python
        run: ruff check .

      - name: Ruff format check
        working-directory: python
        run: ruff format --check .

      - name: Run Python tests
        working-directory: python
        run: python -m pytest tests -q
